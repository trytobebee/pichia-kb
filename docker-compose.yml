# Run: `docker compose up -d`     (start in background)
#      `docker compose logs -f`   (tail logs)
#      `docker compose down`      (stop + remove)
#
# Expects, in the same directory as this file:
#   .env                       — DEEPSEEK_API_KEY=…  KB_DEFAULT_MODEL=deepseek-v4-flash
#   data/projects/<slug>/…     — project data (mounted as a volume)
#
# Port binding modes:
#   - "127.0.0.1:8501:8501"   ← safe default; reach via SSH tunnel only
#   - "8501:8501"              ← open to the internet for demos (no auth!);
#                                  remember to close Aliyun security group
#                                  port 8501 when the demo is done
#
# For real public access add nginx + basic auth in front (see nginx.conf
# in this repo for a working reverse-proxy template + DEPLOY.md §6).

services:
  kb-core:
    image: kb-core:latest
    container_name: kb-core
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

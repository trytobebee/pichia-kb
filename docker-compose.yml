# Run: `docker compose up -d`     (start in background)
#      `docker compose logs -f`   (tail logs)
#      `docker compose down`      (stop + remove)
#      `docker compose pull`      (after `docker load -i kb-core-XXX.tar` of a new tarball, then `up -d` again to restart with the new image)
#
# Expects, in the same directory as this file:
#   .env                       — DEEPSEEK_API_KEY=…  KB_DEFAULT_MODEL=deepseek-v4-flash
#   data/projects/<slug>/…     — your project data (mounted as a volume)

services:
  kb-core:
    image: kb-core:latest
    container_name: kb-core
    restart: unless-stopped
    ports:
      # ⚠️ Bound to 0.0.0.0 for demo / colleague access. Streamlit has no
      # built-in auth, so this means ANYONE who can reach the host on TCP
      # 8501 can use the app and (indirectly) burn your LLM API quota.
      # Switch back to "127.0.0.1:8501:8501" once the demo window ends, or
      # put nginx + basic auth in front (see DEPLOY.md §6).
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
